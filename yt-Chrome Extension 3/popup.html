<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>Custom Timestamps</title>

<style>
body {
  width: 340px;
  padding: 12px;
  font-family: system-ui, Arial, sans-serif;
  background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
  color: #ffffff;
}

h3 {
  text-align: center;
  color: #00e5ff;
}

textarea {
  width: 100%;
  height: 110px;
  background: #1e293b;
  color: #fff;
  border: 1px solid #334155;
  border-radius: 10px;
  padding: 10px;
  resize: none;
}

button {
  width: 100%;
  padding: 10px;
  margin-top: 6px;
  border-radius: 12px;
  border: none;
  background: linear-gradient(135deg, #00e5ff, #3b82f6);
  color: #000;
  font-weight: 600;
  cursor: pointer;
}

button.secondary {
  background: #020617;
  color: #00e5ff;
  border: 1px solid #334155;
}

ul {
  list-style: none;
  padding: 0;
  max-height: 160px;
  overflow-y: auto;
}

li {
  background: #020617;
  padding: 8px;
  margin: 6px 0;
  border-radius: 8px;
  cursor: pointer;
}

li.active {
  border-left: 4px solid #00e5ff;
}
</style>
</head>

<body>
<h3>⏱ Custom Timestamps</h3>

<textarea id="bulkInput"
  placeholder="HH:MM:SS Description
Example:
00:05:04 Java Setup"></textarea>

<button id="currentTimeBtn">➕ Add Current Video Time</button>
<button id="add">Add Timestamps</button>

<ul id="list"></ul>

<button id="exportTxt" class="secondary">Export for YouTube</button>
<button id="exportJson" class="secondary">Export JSON</button>
<input type="file" id="importJson" />

<script src="utils.js"></script>
<script src="popup.js"></script>
</body>
</html>
