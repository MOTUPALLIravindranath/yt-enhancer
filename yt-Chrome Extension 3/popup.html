<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<style>
  body { width: 340px; padding: 12px; font-family: system-ui, sans-serif; background: #0f172a; color: #fff; }
  h3 { color: #00e5ff; text-align: center; margin-top: 0; }
  select, textarea, input { 
    width: 100%; background: #1e293b; color: #fff; border: 1px solid #334155; 
    border-radius: 8px; padding: 10px; margin-bottom: 8px; box-sizing: border-box;
  }
  #list { list-style: none; padding: 0; max-height: 180px; overflow-y: auto; }
  li { 
    background: #1e293b; padding: 10px; margin-bottom: 6px; border-radius: 8px; 
    display: flex; justify-content: space-between; align-items: center; cursor: pointer;
    border-left: 4px solid #3b82f6;
  }
  li.tag-red { border-left-color: #ef4444; }
  li.tag-green { border-left-color: #22c55e; }
  li.tag-yellow { border-left-color: #eab308; }
  button { 
    width: 100%; padding: 10px; border-radius: 8px; border: none; 
    background: linear-gradient(135deg, #00e5ff, #3b82f6); color: #000; 
    font-weight: bold; cursor: pointer; margin-top: 4px;
  }
  .secondary { background: #020617; color: #00e5ff; border: 1px solid #334155; }
  .shortcut-tip { font-size: 11px; color: #94a3b8; text-align: center; margin: 10px 0; }
  .delete-btn { color: #ef4444; font-weight: bold; padding: 0 5px; }
</style>
</head>
<body>
  <h3>⏱ Study Timestamps</h3>
  <select id="tagSelector">
    <option value="blue">🔵 Code / General</option>
    <option value="red">🔥 Important</option>
    <option value="green">🟢 Concept</option>
    <option value="yellow">⚠️ Todo</option>
  </select>

  <textarea id="bulkInput" placeholder="05:20 Binary Search Tree"></textarea>
  
  <button id="currentTimeBtn" class="secondary">➕ Add Current Video Time</button>
  <button id="add">Add Timestamps</button>

  <hr style="border: 0.5px solid #334155; margin: 12px 0;">
  
  <input type="text" id="searchInput" placeholder="Search your notes...">
  <ul id="list"></ul>

  <div class="shortcut-tip">Mac: Control+N/P | Win: Alt+N/P</div>

  <button id="exportTxt" class="secondary">Export for Notion</button>
  <button id="exportJson" class="secondary">Backup (JSON)</button>
  <input type="file" id="importJson" style="display:none" />
  <button id="importBtn" class="secondary" onclick="document.getElementById('importJson').click()">Restore Backup</button>

  <script src="utils.js"></script>
  <script src="popup.js"></script>
</body>
</html>
